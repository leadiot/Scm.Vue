<!DOCTYPE html>
<html lang="zh-CN">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1.0">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<title>Scm.Net - 中后台管理系统快速开发框架</title>
	<meta name="description" content="一款基于.Net 10.0 和 Vue 3.0 技术、适用于企业中后台管理系统的快速开发框架。">
	<meta name="keywords" content="C-SCM, Scm.Net, .Net, Vue, 中后台管理系统, 快速开发框架, 企业级应用, 前后端分离">

	<meta property="og:title" content="Scm.Net">
	<meta property="og:description" content="一款基于.Net 和 Vue 技术、适用于企业中后台管理系统的快速开发框架。">
	<meta property="og:image" content="/img/share.png">
	<meta property="og:url" content="https://www.c-scm.net/">
	<meta property="og:type" content="website">

	<meta name="twitter:card" content="/img/share.png">
	<meta name="twitter:title" content="Scm.Net">
	<meta name="twitter:description" content="一款基于.Net 和 Vue 技术、适用于企业中后台管理系统的快速开发框架。">

	<link rel="icon" href="/favicon.ico" sizes="any">
	<link rel="icon" href="/favicon.svg" type="image/svg+xml">
	<link rel="apple-touch-icon" href="/logo/apple-touch-icon.png">

	<link rel="manifest" href="/manifest.json">
	<meta name="theme-color" content="#ffffff">
	<meta name="mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="#ffffff">

	<link rel="stylesheet" href="material-symbols/index.css" />
	<link rel="stylesheet" href="scicon/iconfont.css" />
	<link rel="stylesheet" href="lib/element-plus/2.11.4/index.min.css" />
	<link rel="stylesheet" href="lib/quill/2.0.3/quill.snow.css" />
	<link rel="stylesheet" href="https://www.oidc.org.cn/app/oidc.min.css" />
	<link rel="stylesheet" href="index.css" />

	<script src="index.js" defer></script>
	<script src="lib/vue/3.5.22/vue.global.min.js" defer></script>
	<script src="lib/vue-router/4.5.1/vue-router.global.min.js" defer></script>
	<script src="lib/vuex/4.1.0/vuex.global.min.js" defer></script>
	<script src="lib/element-plus/2.11.4/index.min.js" defer></script>
	<script src="lib/axios/1.7.7/axios.min.js" defer></script>
	<script src="lib/echarts/6.0.0/echarts.min.js" defer></script>
	<script src="lib/highlight.js/11.11.1/highlight.min.js" type="module" defer></script>
	<script src="lib/xlsx/0.18.5/xlsx.full.min.js" defer></script>
	<script src="lib/quill/2.0.3/quill.js" defer></script>
	<script src="https://www.oidc.org.cn/app/oidc.min.js" charset="utf-8" defer></script>

	<script type="text/javascript">
		document.write("<script src='config.js?" + new Date().getTime() + "'><\/script>");
	</script>
</head>

<body>
	<noscript>
		<strong>
			We're sorry but <%= htmlWebpackPlugin.options.title %> doesn't work properly without JavaScript enabled.
				Please enable it to continue.
		</strong>
		<strong>
			抱歉，<%= htmlWebpackPlugin.options.title %>无法在未启用JavaScript的情况下良好工作，请尝试开户JavaScript功能后重新尝试！
		</strong>
	</noscript>
	<div id="app" class="scmui">
		<div class="app-loading">
			<div class="app-loading__logo">
				<img src="img/logo.png" alt="logo" />
			</div>
			<div class="app-loading__loader"></div>
			<div class="app-loading__title">
				<%= htmlWebpackPlugin.options.title %>
			</div>
			<div class="app-loading__subtitle">
				如果长时间未加载完成，请检查网络连接或按Ctrl+F5强制重新加载。
			</div>
		</div>
	</div>
	<div id="versionCheck" class="lower-version" style="display: none;">
		<h2>当前使用的浏览器内核版本过低 :(</h2>
		<p>当前版本：<span id="versionCheck-type">--</span> <span id="versionCheck-version">--</span></p>
		<p>最低版本要求：<span id="versionCheck-support">--</span>。</p>
		<p>请升级浏览器版本，或更换现代浏览器，如果你使用的是双核浏览器,请切换到极速/高速模式。</p>
	</div>
</body>

</html>
